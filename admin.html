<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غولد ماستر - لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#0d0d0d;color:#f0e8d5;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:28px;color:#C9A84C;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.sub{font-size:13px;color:#666;margin-bottom:30px}
.card{background:#181818;border:1px solid rgba(201,168,76,.15);border-radius:16px;padding:24px;margin-bottom:20px}
.card h2{font-size:18px;color:#C9A84C;margin-bottom:18px}
.irow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label{font-size:12px;color:#C9A84C;font-weight:700;display:block;margin-bottom:6px}
input{width:100%;background:#222;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;color:#f0e8d5;font-size:14px;font-family:'Cairo',sans-serif;outline:none;direction:ltr;text-align:right}
input:focus{border-color:#C9A84C}
input::placeholder{color:rgba(255,255,255,.2)}
button{background:linear-gradient(135deg,#8B6914,#C9A84C);border:none;border-radius:10px;padding:12px 24px;color:#000;font-size:14px;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s}
button:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.3)}
table{width:100%;border-collapse:collapse}
th{font-size:12px;color:#C9A84C;font-weight:700;padding:10px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,.06)}
td{font-size:13px;padding:12px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.2);border-radius:20px;padding:3px 10px;font-size:11px;color:#2ECC71}
.result{margin-top:12px;padding:12px;border-radius:10px;font-size:13px;display:none}
.result.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);color:#2ECC71}
.result.err{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);color:#E74C3C}
.admin-key-row{display:flex;gap:10px;margin-bottom:20px}
.admin-key-row input{flex:1}
</style>
</head>
<body>
<div class="container">
  <h1>🏅 لوحة إدارة غولد ماستر</h1>
  <p class="sub">Gold Master Admin Panel - مخصصة لصاحب الشركة فقط</p>

  <div class="card">
    <h2>🔑 مفتاح الإدارة</h2>
    <div class="admin-key-row">
      <input type="password" id="admin-key" placeholder="أدخل مفتاح الإدارة..." value="goldmaster-admin-2026">
      <button onclick="loadUsers()">تسجيل الدخول</button>
    </div>
  </div>

  <div class="card">
    <h2>➕ إضافة عميل جديد</h2>
    <div class="irow">
      <div><label>الاسم الكامل</label><input id="n-name" placeholder="اسم العميل"></div>
      <div><label>رقم الهاتف</label><input id="n-phone" placeholder="09XXXXXXXX" class="ltr"></div>
    </div>
    <div class="irow">
      <div><label>المدينة</label><input id="n-city" placeholder="حلب - الباب"></div>
      <div><label>الرصيد الابتدائي (ل.س)</label><input id="n-bal" type="number" placeholder="0"></div>
    </div>
    <div class="irow">
      <div><label>كلمة المرور</label><input id="n-pw" type="password" placeholder="كلمة المرور"></div>
      <div><label>رمز PIN (4 أرقام)</label><input id="n-pin" type="password" placeholder="1234" maxlength="4"></div>
    </div>
    <button onclick="createUser()">إنشاء الحساب</button>
    <div class="result" id="create-result"></div>
  </div>

  <div class="card">
    <h2>👥 جميع العملاء</h2>
    <button onclick="loadUsers()" style="margin-bottom:16px">🔄 تحديث</button>
    <div style="overflow-x:auto">
      <table id="users-table">
        <thead><tr><th>رقم الحساب</th><th>الاسم</th><th>الهاتف</th><th>الرصيد</th><th>المدينة</th><th>الحالة</th><th>تاريخ الإنشاء</th></tr></thead>
        <tbody id="users-tbody"><tr><td colspan="7" style="text-align:center;color:#666;padding:20px">اضغط "تحديث" لتحميل البيانات</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function key(){return document.getElementById('admin-key').value}

async function loadUsers(){
  try{
    const r=await fetch('/api/admin/users',{headers:{'X-Admin-Key':key()}});
    const d=await r.json();
    if(!r.ok){alert('خطأ: '+d.error);return}
    const tb=document.getElementById('users-tbody');
    if(!d.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#666;padding:20px">لا يوجد عملاء بعد</td></tr>';return}
    tb.innerHTML=d.map(u=>`
      <tr>
        <td style="font-family:monospace;color:#C9A84C">${u.id}</td>
        <td>${u.name}</td>
        <td style="direction:ltr;text-align:right">${u.phone}</td>
        <td style="color:#E8C96A;font-weight:700">${parseFloat(u.balance).toLocaleString('ar')} ل.س</td>
        <td>${u.city||'—'}</td>
        <td><span class="badge">${u.status}</span></td>
        <td style="font-size:11px;color:#666">${(u.created_at||'').slice(0,10)}</td>
      </tr>
    `).join('');
  }catch(e){alert('تعذر الاتصال بالسيرفر')}
}

async function createUser(){
  const body={
    name:document.getElementById('n-name').value.trim(),
    phone:document.getElementById('n-phone').value.trim(),
    city:document.getElementById('n-city').value.trim(),
    balance:parseFloat(document.getElementById('n-bal').value)||0,
    password:document.getElementById('n-pw').value,
    pin:document.getElementById('n-pin').value
  };
  if(!body.name||!body.phone||!body.password||!body.pin){alert('أكمل جميع الحقول');return}
  const el=document.getElementById('create-result');
  try{
    const r=await fetch('/api/admin/create-user',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key()},body:JSON.stringify(body)});
    const d=await r.json();
    if(r.ok){
      el.className='result ok';el.style.display='block';
      el.textContent='✅ تم إنشاء الحساب: '+d.id;
      loadUsers();
    }else{
      el.className='result err';el.style.display='block';
      el.textContent='❌ '+d.error;
    }
  }catch(e){el.className='result err';el.style.display='block';el.textContent='❌ تعذر الاتصال'}
}
</script>
</body>
</html>
